<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>EchoSafe - Police Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #060714;
        color: #f5f5f5;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        padding: 1rem 2rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      header h1 {
        font-size: 1.4rem;
        margin: 0;
      }
      header span {
        font-size: 0.85rem;
        opacity: 0.8;
      }
      main {
        flex: 1;
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 1px;
        background: rgba(255, 255, 255, 0.1);
      }
      section {
        background: #070a1f;
        padding: 1rem 1.5rem;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      h2 {
        font-size: 1rem;
        margin: 0 0 0.5rem 0;
      }
      .connection-status {
        font-size: 0.85rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.75rem;
      }
      .badge {
        padding: 0.15rem 0.5rem;
        border-radius: 999px;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .badge.ok {
        background: rgba(22, 163, 74, 0.16);
        color: #4ade80;
      }
      .badge.error {
        background: rgba(239, 68, 68, 0.18);
        color: #f87171;
      }
      .badge.idle {
        background: rgba(148, 163, 184, 0.18);
        color: #e5e7eb;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.25rem 0.6rem;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.12);
        font-size: 0.75rem;
      }
      .pill span.key {
        opacity: 0.8;
      }
      .pill span.value {
        font-weight: 600;
        color: #e5e7eb;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.5rem;
        margin-bottom: 0.75rem;
      }
      .stat-card {
        background: rgba(15, 23, 42, 0.9);
        border-radius: 0.75rem;
        padding: 0.75rem;
        border: 1px solid rgba(148, 163, 184, 0.3);
      }
      .stat-label {
        font-size: 0.75rem;
        opacity: 0.8;
      }
      .stat-value {
        margin-top: 0.25rem;
        font-size: 1.2rem;
        font-weight: 600;
      }
      .scroll {
        flex: 1;
        overflow-y: auto;
        border-radius: 0.75rem;
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.25), transparent 55%),
          radial-gradient(circle at bottom right, rgba(239, 68, 68, 0.25), transparent 55%),
          rgba(15, 23, 42, 0.9);
      }
      .scroll-inner {
        padding: 0.75rem 0.75rem 0.5rem 0.75rem;
        font-family: "JetBrains Mono", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 0.8rem;
        line-height: 1.45;
        white-space: pre-wrap;
      }
      .log-line {
        opacity: 0.9;
      }
      .log-line time {
        opacity: 0.7;
      }
      .log-line span.tag {
        padding: 0.1rem 0.4rem;
        border-radius: 999px;
        font-size: 0.7rem;
        margin-right: 0.3rem;
      }
      .log-line span.tag.sos {
        background: rgba(239, 68, 68, 0.25);
        color: #fecaca;
      }
      .log-line span.tag.location {
        background: rgba(59, 130, 246, 0.25);
        color: #bfdbfe;
      }
      .log-line span.tag.harassment {
        background: rgba(234, 179, 8, 0.25);
        color: #facc15;
      }
      .log-line span.tag.media {
        background: rgba(34, 197, 94, 0.25);
        color: #bbf7d0;
      }
      .log-line span.tag.system {
        background: rgba(148, 163, 184, 0.25);
        color: #e5e7eb;
      }
      .ride-list {
        flex: 1;
        overflow-y: auto;
        border-radius: 0.75rem;
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: rgba(15, 23, 42, 0.9);
        padding: 0.5rem;
      }
      .ride-item {
        border-radius: 0.75rem;
        padding: 0.55rem 0.65rem;
        border: 1px solid transparent;
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        margin-bottom: 0.4rem;
        background: rgba(15, 23, 42, 0.9);
      }
      .ride-item.active {
        border-color: rgba(59, 130, 246, 0.7);
        box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.7);
      }
      .ride-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .ride-id {
        font-size: 0.8rem;
        font-weight: 600;
      }
      .ride-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.3rem;
      }
      .ride-meta span {
        font-size: 0.7rem;
        opacity: 0.85;
      }
      .ride-status {
        font-size: 0.7rem;
        padding: 0.2rem 0.45rem;
        border-radius: 999px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .status-sos {
        background: rgba(239, 68, 68, 0.2);
        color: #fecaca;
      }
      .status-flagged {
        background: rgba(234, 179, 8, 0.2);
        color: #fef3c7;
      }
      .status-active {
        background: rgba(59, 130, 246, 0.2);
        color: #bfdbfe;
      }
      footer {
        padding: 0.4rem 1.5rem 0.6rem 1.5rem;
        font-size: 0.75rem;
        opacity: 0.7;
        display: flex;
        justify-content: space-between;
      }
      footer span {
        white-space: nowrap;
      }
      .map-shell {
        margin-top: 0.75rem;
        margin-bottom: 0.75rem;
        border-radius: 0.75rem;
        overflow: hidden;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.2), transparent 60%),
          rgba(15, 23, 42, 0.98);
      }
      .map-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.35rem 0.8rem;
        font-size: 0.75rem;
        opacity: 0.9;
      }
      .map-header span.label {
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-weight: 500;
      }
      .map-header span.meta {
        opacity: 0.8;
      }
      #map {
        width: 100%;
        height: 220px;
      }
      .leaflet-container {
        background: #020617;
      }
      .leaflet-control-attribution {
        font-size: 9px;
      }
      .sos-marker .sos-pulse {
        width: 22px;
        height: 22px;
        border-radius: 999px;
        background: rgba(248, 113, 113, 0.95);
        box-shadow: 0 0 0 2px rgba(248, 113, 113, 0.7), 0 0 16px rgba(248, 113, 113, 0.9);
        position: relative;
      }
      .sos-marker .sos-pulse::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        border: 2px solid rgba(248, 113, 113, 0.7);
        animation: sosPulse 1.5s ease-out infinite;
      }
      @keyframes sosPulse {
        0% {
          opacity: 0.9;
          transform: scale(1);
        }
        100% {
          opacity: 0;
          transform: scale(2.1);
        }
      }
      @media (max-width: 900px) {
        main {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>EchoSafe · Police Command</h1>
        <span>Live SOS, harassment and ride status monitor</span>
      </div>
      <div class="connection-status">
        <span id="ws-status" class="badge idle">Connecting…</span>
        <div class="pill">
          <span class="key">WS</span><span class="value" id="ws-endpoint"></span>
        </div>
      </div>
    </header>
    <main>
      <section aria-label="Live timeline">
        <h2>Event timeline</h2>
        <div class="grid">
          <div class="stat-card">
            <div class="stat-label">Active rides</div>
            <div class="stat-value" id="stat-active-rides">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Open SOS</div>
            <div class="stat-value" id="stat-open-sos">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Media items</div>
            <div class="stat-value" id="stat-media">0</div>
          </div>
        </div>
        <div class="scroll" aria-label="Event log">
          <div id="log" class="scroll-inner"></div>
        </div>
      </section>
      <section aria-label="Ride status">
        <h2>Rides overview</h2>
        <div class="map-shell" aria-label="SOS focus map">
          <div class="map-header">
            <span class="label">SOS ride tracker</span>
            <span class="meta" id="map-meta">Waiting for SOS…</span>
          </div>
          <div id="map"></div>
        </div>
        <div class="ride-list" id="ride-list"></div>
      </section>
    </main>
    <footer>
      <span>Tokens issued via <code>/auth/token</code> · role <strong>POLICE</strong></span>
      <span id="footer-time"></span>
    </footer>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./main.js"></script>
  </body>
  </html>
